<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 800 20px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .sub { font: 600 12px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #6B7280; }
      .h2 { font: 900 14px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .h3 { font: 800 12px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .label { font: 700 11px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .muted { font: 600 10px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #6B7280; }
      .mono { font: 600 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; fill: #6B7280; }
      .chipOn { font: 900 10px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #065F46; }
      .chipOff { font: 900 10px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #6B7280; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="980" fill="#F3F4F6"/>
  <text x="40" y="44" class="title">Desktop Home Wireframe v1 — Profesional + Impactante</text>
  <text x="40" y="68" class="sub">Target: xl (1280) / 2xl (1536). Layout: topbar sticky + hero 8/4 + grids (sin “carrusel móvil” en desktop).</text>

  <!-- Outer container note -->
  <text x="40" y="96" class="mono">Container: max-w-7xl (≈1280px) • px-6 • gap-8 • section spacing: 32–48px</text>

  <!-- Main container -->
  <g filter="url(#shadow)">
    <rect x="120" y="120" width="1360" height="820" rx="28" fill="#FFFFFF"/>
  </g>
  <text x="1320" y="152" class="mono">/app (desktop)</text>

  <!-- Sticky topbar -->
  <rect x="160" y="150" width="1280" height="64" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="180" y="176" class="label">📍 Bucaramanga</text>
  <rect x="420" y="162" width="640" height="40" rx="16" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="440" y="187" class="muted">🔎 Buscar negocio o producto…</text>
  <text x="1310" y="186" class="muted">🔔   ♡   👤</text>
  <text x="180" y="210" class="mono">Sticky, compacta. Saludo pasa a secundario.</text>

  <!-- Hero: 8/4 columns -->
  <!-- Left column (8) -->
  <rect x="160" y="240" width="832" height="320" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="184" y="270" class="h2">Activos ahora</text>
  <text x="870" y="270" class="label" fill="#059669">Ver todo →</text>
  <text x="184" y="292" class="muted">Solo: abierto + con stock. Cards grandes (320–360px) con KPIs.</text>

  <!-- Quick filter chips (top of left col) -->
  <rect x="184" y="306" width="68" height="24" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="198" y="322" class="chipOn">≤2 km</text>
  <rect x="258" y="306" width="78" height="24" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="270" y="322" class="chipOn">-40%+</text>
  <rect x="342" y="306" width="76" height="24" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="352" y="322" class="chipOn">≤2 horas</text>
  <rect x="424" y="306" width="64" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="438" y="322" class="chipOff">Packs</text>
  <rect x="494" y="306" width="64" height="24" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="506" y="322" class="chipOff">Platos</text>

  <!-- Active cards row -->
  <!-- Card 1 -->
  <rect x="184" y="344" width="244" height="190" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="184" y="344" width="244" height="96" rx="18" fill="#E5E7EB"/>
  <text x="196" y="460" class="h3">Sushi Master 83</text>
  <rect x="196" y="472" width="110" height="18" rx="9" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="204" y="485" class="chipOn">Abierto • 23:59</text>
  <rect x="196" y="494" width="118" height="18" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="204" y="507" class="muted">5 productos • 1.2 km</text>
  <rect x="196" y="516" width="90" height="18" rx="9" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="204" y="529" class="muted" fill="#991B1B">Vence pronto</text>

  <!-- Card 2 -->
  <rect x="444" y="344" width="244" height="190" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="444" y="344" width="244" height="96" rx="18" fill="#E5E7EB"/>
  <text x="456" y="460" class="h3">Curry House 74</text>
  <rect x="456" y="472" width="110" height="18" rx="9" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="464" y="485" class="chipOn">Abierto • 23:30</text>
  <rect x="456" y="494" width="118" height="18" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="464" y="507" class="muted">4 productos • 0.8 km</text>
  <rect x="456" y="516" width="86" height="18" rx="9" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="464" y="529" class="muted">-55% top</text>

  <!-- Card 3 -->
  <rect x="704" y="344" width="264" height="190" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="704" y="344" width="264" height="96" rx="18" fill="#E5E7EB"/>
  <text x="716" y="460" class="h3">Panadería Sol</text>
  <rect x="716" y="472" width="110" height="18" rx="9" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="724" y="485" class="chipOn">Abierto • 20:00</text>
  <rect x="716" y="494" width="132" height="18" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="724" y="507" class="muted">3 productos • 2.1 km</text>
  <rect x="716" y="516" width="120" height="18" rx="9" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="724" y="529" class="muted" fill="#9A3412">⬇︎ Precio bajando</text>

  <!-- Right column (4): Side panel -->
  <rect x="1008" y="240" width="432" height="320" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="1032" y="270" class="h2">Panel rápido</text>
  <text x="1032" y="292" class="muted">Impacto + última llamada (urgencia). Evita banner gigante.</text>

  <!-- Impact card -->
  <rect x="1032" y="308" width="384" height="92" rx="18" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="1052" y="338" class="label">Tu impacto hoy</text>
  <text x="1052" y="358" class="muted">Puntos • CO₂ evitado • ahorro</text>
  <text x="1310" y="350" class="label" fill="#059669">Ver →</text>

  <!-- Ending soon list -->
  <rect x="1032" y="414" width="384" height="128" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="1052" y="442" class="label">Última llamada</text>
  <text x="1052" y="462" class="muted">3–5 items (vence ≤ 2h)</text>
  <rect x="1052" y="476" width="344" height="18" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>
  <rect x="1052" y="500" width="344" height="18" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>
  <rect x="1052" y="524" width="344" height="18" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>

  <!-- Products section -->
  <rect x="160" y="584" width="1280" height="220" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="184" y="614" class="h2">Productos disponibles</text>
  <text x="184" y="636" class="muted">En desktop: grid (3–5 cols). Carrusel solo para “Destacados”.</text>

  <!-- Toolbar -->
  <rect x="1050" y="600" width="170" height="28" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="1064" y="618" class="muted">Orden: Cerca ⌄</text>
  <rect x="1230" y="600" width="186" height="28" rx="14" fill="#10B981"/>
  <text x="1252" y="618" class="chipOn" fill="#FFFFFF">Ver todos / Explorar</text>

  <!-- Grid preview (4 cols) -->
  <rect x="184" y="654" width="280" height="130" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="184" y="654" width="280" height="64" rx="18" fill="#E5E7EB"/>
  <text x="196" y="740" class="muted">Card producto</text>

  <rect x="480" y="654" width="280" height="130" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="480" y="654" width="280" height="64" rx="18" fill="#E5E7EB"/>
  <text x="492" y="740" class="muted">Card producto</text>

  <rect x="776" y="654" width="280" height="130" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="776" y="654" width="280" height="64" rx="18" fill="#E5E7EB"/>
  <text x="788" y="740" class="muted">Card producto</text>

  <rect x="1072" y="654" width="344" height="130" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="1072" y="654" width="344" height="64" rx="18" fill="#E5E7EB"/>
  <text x="1084" y="740" class="muted">Card producto</text>

  <!-- Venues near section -->
  <rect x="160" y="828" width="1280" height="88" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="184" y="858" class="h2">Negocios cerca</text>
  <text x="184" y="880" class="muted">En desktop: grid 3 cols (o split lista+mapa). Evitar hero/banner gigante.</text>
  <text x="1320" y="878" class="label" fill="#059669">Ver todos →</text>

  <!-- Footer note -->
  <text x="40" y="968" class="muted">Archivo: public/mockups/customer-home-desktop-wireframe.svg</text>
</svg>

