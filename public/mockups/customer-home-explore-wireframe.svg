<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 18px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .h2 { font: 800 14px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .label { font: 700 11px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .muted { font: 600 10px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #6B7280; }
      .chip { font: 800 10px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #065F46; }
      .chipOff { font: 800 10px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #6B7280; }
      .mono { font: 600 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; fill: #6B7280; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Canvas background -->
  <rect x="0" y="0" width="1400" height="900" fill="#F3F4F6"/>
  <text x="40" y="40" class="title">Wireframe v1 — Customer Home + Explore (“Ver más productos”)</text>
  <text x="40" y="62" class="muted">Objetivo: negocios activos (abierto + stock) + productos disponibles + filtros combinables (distancia, descuento, vence pronto, tipo).</text>

  <!-- Screen: Home -->
  <g filter="url(#shadow)">
    <rect x="40" y="90" width="640" height="770" rx="28" fill="#FFFFFF"/>
  </g>
  <text x="70" y="130" class="h2">HOME (Cliente)</text>
  <text x="520" y="130" class="mono">/app</text>

  <!-- Top header -->
  <rect x="70" y="145" width="190" height="34" rx="17" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="88" y="167" class="chip">📍 Ciudad / Zona</text>
  <rect x="600" y="145" width="50" height="34" rx="17" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="612" y="167" class="muted">🔔</text>

  <text x="70" y="215" class="title">¡Hola! Descubre rescates</text>
  <text x="70" y="238" class="muted">Subtítulo / contexto</text>

  <!-- Search bar -->
  <rect x="70" y="255" width="580" height="46" rx="18" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="88" y="284" class="muted">🔎 Buscar negocio o producto…</text>

  <!-- Categories chips -->
  <rect x="70" y="315" width="74" height="28" rx="14" fill="#10B981"/>
  <text x="86" y="334" class="chip" fill="#FFFFFF">Todos</text>
  <rect x="152" y="315" width="86" height="28" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="170" y="334" class="chipOff">Packs</text>
  <rect x="246" y="315" width="86" height="28" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="258" y="334" class="chipOff">Platos</text>
  <rect x="340" y="315" width="110" height="28" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="356" y="334" class="chipOff">Panadería</text>

  <!-- Active venues section -->
  <text x="70" y="385" class="h2">Activos ahora</text>
  <text x="570" y="385" class="label" fill="#059669">Ver todo →</text>
  <text x="70" y="405" class="muted">Abierto + con stock (productos activos)</text>

  <!-- Active venue cards row -->
  <g>
    <rect x="70" y="420" width="180" height="190" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="70" y="420" width="180" height="92" rx="18" fill="#E5E7EB"/>
    <text x="82" y="532" class="label">Café Central</text>
    <text x="82" y="552" class="muted">Abierto hasta 21:30</text>
    <text x="82" y="571" class="muted">6 productos • 1.2 km</text>
    <rect x="82" y="584" width="96" height="18" rx="9" fill="#ECFDF5" stroke="#A7F3D0"/>
    <text x="90" y="597" class="chip">-40% promo</text>
  </g>
  <g>
    <rect x="260" y="420" width="180" height="190" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="260" y="420" width="180" height="92" rx="18" fill="#E5E7EB"/>
    <text x="272" y="532" class="label">Panadería Sol</text>
    <text x="272" y="552" class="muted">Abierto hasta 20:00</text>
    <text x="272" y="571" class="muted">3 productos • 0.8 km</text>
    <rect x="272" y="584" width="120" height="18" rx="9" fill="#FEF2F2" stroke="#FECACA"/>
    <text x="280" y="597" class="chip" fill="#991B1B">Vence pronto</text>
  </g>
  <g>
    <rect x="450" y="420" width="200" height="190" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="450" y="420" width="200" height="92" rx="18" fill="#E5E7EB"/>
    <text x="462" y="532" class="label">Sushi Go</text>
    <text x="462" y="552" class="muted">Abierto hasta 22:00</text>
    <text x="462" y="571" class="muted">9 productos • 2.0 km</text>
    <rect x="462" y="584" width="130" height="18" rx="9" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="470" y="597" class="chip" fill="#9A3412">⬇︎ Precio bajando</text>
  </g>

  <!-- Products available section -->
  <text x="70" y="655" class="h2">Productos disponibles</text>
  <text x="70" y="675" class="muted">Filas “descubrimiento” con CTA a Explore (con filtros preaplicados)</text>

  <!-- Discovery rows -->
  <text x="70" y="712" class="label">Cerca de ti</text>
  <text x="570" y="712" class="label" fill="#059669">Ver más →</text>
  <rect x="70" y="724" width="580" height="78" rx="16" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="88" y="754" class="muted">[cards horizontales] (ordenadas por distancia)</text>

  <text x="70" y="825" class="label">Más descuento</text>
  <text x="570" y="825" class="label" fill="#059669">Ver más →</text>
  <rect x="70" y="837" width="580" height="78" rx="16" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="88" y="867" class="muted">[cards horizontales] (ordenadas por % ahorro)</text>

  <!-- Screen: Explore -->
  <g filter="url(#shadow)">
    <rect x="720" y="90" width="640" height="770" rx="28" fill="#FFFFFF"/>
  </g>
  <text x="750" y="130" class="h2">EXPLORE (“Ver más productos”)</text>
  <text x="1200" y="130" class="mono">/app/explore</text>

  <!-- Explore header -->
  <rect x="750" y="145" width="580" height="46" rx="18" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="768" y="174" class="muted">← Volver   🔎 Buscar (opcional)</text>

  <!-- Filter chips -->
  <text x="750" y="220" class="label">Filtros (combinables)</text>
  <rect x="750" y="235" width="122" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="762" y="254" class="chip">Distancia</text>
  <rect x="880" y="235" width="122" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="892" y="254" class="chip">Descuento</text>
  <rect x="1010" y="235" width="122" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="1022" y="254" class="chip">Vence pronto</text>
  <rect x="1140" y="235" width="190" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="1152" y="254" class="chip">Tipo (Pack/Plato)</text>

  <!-- Sort + quick summary -->
  <rect x="750" y="275" width="210" height="30" rx="15" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="762" y="295" class="muted">Orden: Recomendado ⌄</text>
  <text x="980" y="295" class="muted">Mostrando: abiertos + stock</text>

  <!-- Results grid -->
  <text x="750" y="340" class="label">Resultados</text>
  <g>
    <rect x="750" y="355" width="280" height="200" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="750" y="355" width="280" height="96" rx="18" fill="#E5E7EB"/>
    <text x="762" y="470" class="label">Pack Sorpresa</text>
    <text x="762" y="490" class="muted">-55% • 1.0 km • vence 1h</text>
    <rect x="762" y="505" width="118" height="20" rx="10" fill="#10B981"/>
    <text x="774" y="519" class="chip" fill="#FFFFFF">Ver detalle</text>
  </g>
  <g>
    <rect x="1050" y="355" width="280" height="200" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="1050" y="355" width="280" height="96" rx="18" fill="#E5E7EB"/>
    <text x="1062" y="470" class="label">Plato del día</text>
    <text x="1062" y="490" class="muted">-35% • 2.2 km • vence 3h</text>
    <rect x="1062" y="505" width="118" height="20" rx="10" fill="#10B981"/>
    <text x="1074" y="519" class="chip" fill="#FFFFFF">Ver detalle</text>
  </g>
  <g>
    <rect x="750" y="575" width="280" height="200" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="750" y="575" width="280" height="96" rx="18" fill="#E5E7EB"/>
    <text x="762" y="690" class="label">Bowl vegano</text>
    <text x="762" y="710" class="muted">-45% • 0.6 km • vence 2h</text>
    <rect x="762" y="725" width="118" height="20" rx="10" fill="#10B981"/>
    <text x="774" y="739" class="chip" fill="#FFFFFF">Ver detalle</text>
  </g>
  <g>
    <rect x="1050" y="575" width="280" height="200" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="1050" y="575" width="280" height="96" rx="18" fill="#E5E7EB"/>
    <text x="1062" y="690" class="label">Pack panadería</text>
    <text x="1062" y="710" class="muted">-60% • 1.8 km • vence 45m</text>
    <rect x="1062" y="725" width="118" height="20" rx="10" fill="#10B981"/>
    <text x="1074" y="739" class="chip" fill="#FFFFFF">Ver detalle</text>
  </g>

  <!-- Footer note -->
  <text x="40" y="885" class="muted">Archivo: public/mockups/customer-home-explore-wireframe.svg</text>
</svg>
