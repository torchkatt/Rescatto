name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Bloquear secretos versionados
        run: |
          if git grep -InE "AIzaSy[a-zA-Z0-9_-]{20,}|sk-[a-zA-Z0-9]{20,}|SG\.[a-zA-Z0-9._-]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----" -- . ':(exclude)*.md' ':(exclude)*.example' ; then
            echo "::error::Se detectó un posible secreto en el repositorio."
            exit 1
          fi
          echo "OK: sin coincidencias de patrones de secretos conocidos."

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_STORAGE_BUCKET: dummy.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "0"
          VITE_FIREBASE_APP_ID: dummy
          VITE_WOMPI_PUBLIC_KEY: pub_test_PLACEHOLDER
          VITE_SENTRY_DSN: ""
          VITE_API_URL: https://example.com
      - name: Verificar que el bundle no contiene claves secretas
        run: |
          if grep -rE "AIzaSy[a-zA-Z0-9_-]{20,}|sk-[a-zA-Z0-9]{20,}|SG\.[a-zA-Z0-9._-]{20,}" dist/ ; then
            echo "::error::El bundle de producción contiene un secreto. No debe desplegarse."
            exit 1
          fi
          echo "OK: bundle sin secretos de backend."

  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
      - name: Reglas Firestore contra emulador
        run: npm run test:rules
