name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: 🧪 Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install
        run: npm ci

      - name: 🔍 TypeScript
        run: npm run lint

      - name: 🧪 Tests
        run: npm run test:run

      - name: 🏗️ Build
        run: npm run build

  deploy-staging:
    name: 🚀 Deploy Staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🔑 Inject env vars
        run: |
          echo "VITE_DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env

      - uses: w9jds/firebase-action@v13
        with:
          args: deploy --only firestore:rules,firestore:indexes,hosting --project rescatto-staging
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-functions-staging:
    name: ⚡ Deploy Functions (Staging)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install functions deps
        working-directory: ./functions
        run: npm ci --production

      - name: 🔑 Set env vars
        working-directory: ./functions
        run: cp .env.yaml .env

      - uses: w9jds/firebase-action@v13
        with:
          args: deploy --only functions --project rescatto-staging
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
